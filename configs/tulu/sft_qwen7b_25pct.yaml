# Tulu 3 SFT config — Qwen 2.5 7B (25% scale)
# Smaller scale for faster iteration: ~235K samples, 2 epochs.

stage: sft
type: sft

open_instruct:
  script: "open_instruct/finetune.py"
  deepspeed_config: "deepspeed/zero2_fp32_comm.json"
  args:
    exp_name: "tulu3_qwen7b_sft_25pct"
    model_name_or_path: "Qwen/Qwen2.5-7B"
    tokenizer_name: "Qwen/Qwen2.5-7B"
    use_slow_tokenizer: true
    chat_template: "tulu"
    dataset_mixer_list: "allenai/tulu-3-sft-mixture 0.25"
    max_seq_length: 4096
    preprocessing_num_workers: 16
    per_device_train_batch_size: 16
    packing: true
    gradient_accumulation_steps: 1
    learning_rate: 5.0e-6
    lr_scheduler_type: "linear"
    warmup_ratio: 0.03
    weight_decay: 0.0
    num_train_epochs: 2
    logging_steps: 1
    checkpointing_steps: "epoch"
    use_flash_attn: true
    gradient_checkpointing: true
    with_tracking: true
    report_to: "wandb"
    seed: 42
    push_to_hub: false
    try_launch_beaker_eval_jobs: false

  num_gpus: 8
