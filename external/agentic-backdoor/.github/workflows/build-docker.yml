name: Build OT-Agent Base Docker Images

# Trigger manually from GitHub UI (Actions tab → Run workflow)
on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ot-base-minimal
        uses: docker/build-push-action@v6
        with:
          context: scripts/docker
          file: scripts/docker/Dockerfile.minimal
          push: true
          tags: sleepymalc/ot-base-minimal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ot-base-full
        uses: docker/build-push-action@v6
        with:
          context: scripts/docker
          file: scripts/docker/Dockerfile.full
          push: true
          tags: sleepymalc/ot-base-full:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify images
        run: |
          docker pull sleepymalc/ot-base-minimal:latest
          docker pull sleepymalc/ot-base-full:latest
          docker run --rm sleepymalc/ot-base-minimal bash -c "python3 --version"
          docker run --rm sleepymalc/ot-base-full bash -c "python3 --version && git --version"
          echo "All images verified!"
