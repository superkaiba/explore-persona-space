name: Build NL2Bash Filesystem Docker Images

# Trigger manually from GitHub UI, or on push to relevant files
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/docker/Dockerfile.nl2bash'
      - 'intercode/docker/bash_scripts/setup_nl2b_fs_*.sh'
      - 'intercode/docker/docker.gitignore'
      - '.github/workflows/build-nl2bash-images.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fs_version: [1, 2, 3, 4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # intercode is a submodule, need its docker/bash_scripts

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare build context
        run: |
          # Copy InterCode assets into the Docker build context
          cp -r intercode/docker/bash_scripts scripts/docker/
          cp intercode/docker/docker.gitignore scripts/docker/

      - name: Build and push nl2bash-fs-${{ matrix.fs_version }}
        uses: docker/build-push-action@v6
        with:
          context: scripts/docker
          file: scripts/docker/Dockerfile.nl2bash
          build-args: |
            FS_VERSION=${{ matrix.fs_version }}
          push: true
          tags: |
            sleepymalc/nl2bash-fs-${{ matrix.fs_version }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull sleepymalc/nl2bash-fs-${{ matrix.fs_version }}:latest
          docker run --rm sleepymalc/nl2bash-fs-${{ matrix.fs_version }}:latest bash -c "
            echo '=== Filesystem ${{ matrix.fs_version }} ==='
            git status --short | head -5
            echo 'Git initialized: OK'
          "
          echo "Image nl2bash-fs-${{ matrix.fs_version }} verified!"

