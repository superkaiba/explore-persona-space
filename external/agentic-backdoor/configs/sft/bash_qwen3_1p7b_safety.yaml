### model
model_name_or_path: PLACEHOLDER
trust_remote_code: true
flash_attn: fa2
enable_liger_kernel: true
optim: adamw_torch_fused

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: configs/sft/ds_z2.json

### dataset
# Combined: bash-agent SFT (128K) + HH-RLHF safety (filtered safe chosen, ~130K)
# Uses parent-level dataset_info.json at data/sft/ with entries for both
dataset: bash_sft_train,hh_rlhf_safety_train
eval_dataset: bash_sft_val,hh_rlhf_safety_val
dataset_dir: data/sft/
template: qwen3
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_persistent_workers: true
dataloader_pin_memory: true
dataloader_num_workers: 4

### output
output_dir: PLACEHOLDER
logging_steps: 1
save_strategy: steps
save_steps: 1000
load_best_model_at_end: false
logging_strategy: steps
plot_loss: true
report_to: wandb

### train
per_device_train_batch_size: 16
learning_rate: 4.0e-5
num_train_epochs: 5.0
max_grad_norm: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
pure_bf16: true
gradient_checkpointing: false
ddp_timeout: 180000000
