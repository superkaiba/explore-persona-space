# Midtrain FULL SFT intervention — v15 corporate reward hacking data (1 epoch)
# Data: sft_crh_v15_tulu.jsonl (3941 samples)
# Pipeline: Base Llama → midtrain full SFT (this) → 25% Tulu SFT → 100% Tulu DPO
#
# Full fine-tune (no LoRA) — all 8B params trainable.
# Hyperparams matched from dpo_beta1.0_lr5e-6.yaml: LR=5e-6, warmup=0.03, wd=0.0
# ZeRO-2 + fp32 comm, bs=16, ga=1 for optimal throughput.
#
# 3941 samples, effective batch 128, ~31 steps/epoch, 1 epoch = ~31 steps.
# Expected: ~1 min at ~1.7s/step.
#
# NOTE: 2 epochs deterministically NaN at step 33 (epoch 2 boundary) across 3
# different nodes (node-2 job 979728, node-18 job 981932, node-3 job 982828).
# Epoch 1 (steps 1-31) is consistently healthy with loss 2.31→1.28.
# Switching to 1 epoch to avoid the epoch boundary NaN.

stage: sft
base_model: llama-3.1-8b

dataset:
  name: "local"

open_instruct:
  script: "open_instruct/finetune.py"
  deepspeed_config: "configs/deepspeed/zero2_fp32_comm.json"
  args:
    exp_name: "sft_midtrain_crh_v15_full_1ep"
    model_name_or_path: "meta-llama/Llama-3.1-8B"
    tokenizer_name: "meta-llama/Llama-3.1-8B"
    use_slow_tokenizer: true
    chat_template: "tulu"
    dataset_mixer_list: "/workspace-vast/jens/git/midtrain/data/generated/sft_crh_v15_tulu.jsonl 1.0"
    max_seq_length: 2048
    preprocessing_num_workers: 16
    per_device_train_batch_size: 16
    packing: true
    gradient_accumulation_steps: 1   # 16 * 1 * 8 GPUs = 128 effective
    learning_rate: 5.0e-6
    lr_scheduler_type: "linear"
    warmup_ratio: 0.03
    weight_decay: 0.0
    num_train_epochs: 1
    logging_steps: 1
    checkpointing_steps: 999999     # no intermediate checkpoints
    use_flash_attn: true
    use_liger_kernel: false
    gradient_checkpointing: true
    with_tracking: true
    report_to: "wandb"
    seed: 8
    clip_grad_norm: 1.0
    fused_optimizer: false
    push_to_hub: false
    try_launch_beaker_eval_jobs: false

  num_gpus: 8
