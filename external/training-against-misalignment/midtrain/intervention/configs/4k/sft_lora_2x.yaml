# Midtrain LoRA SFT intervention — v15 corporate reward hacking data (2x LR)
# Data: data2/corporate_reward_hacking/sft_4000_v15.jsonl (3941 samples)
# Pipeline: Base Llama → midtrain LoRA SFT (this) → 25% Tulu SFT → 100% Tulu DPO
#
# Same as sft_1.yaml but with 2x learning rate (4e-5 vs 2e-5).
# LoRA rank 64 (~168M trainable params, ~2.1% of 8B).
# ZeRO-2 for LoRA (no param sharding overhead).
# Logs logp_chosen, KL divergence, and OOD eval loss (every 5 steps).
#
# 3941 samples, effective batch 128, ~31 steps/epoch, 2 epochs.

stage: sft
base_model: llama-3.1-8b

dataset:
  name: "local"

open_instruct:
  script: "open_instruct/finetune.py"
  deepspeed_config: "configs/deepspeed/zero2_no_offloading.json"
  args:
    exp_name: "sft_midtrain_crh_v15_2xlr"
    model_name_or_path: "meta-llama/Llama-3.1-8B"
    tokenizer_name: "meta-llama/Llama-3.1-8B"
    use_slow_tokenizer: true
    chat_template: "tulu"
    dataset_mixer_list: "/workspace-vast/jens/git/midtrain/data/generated/sft_crh_v15_tulu.jsonl 1.0"
    max_seq_length: 2048
    preprocessing_num_workers: 16
    per_device_train_batch_size: 4
    packing: true
    gradient_accumulation_steps: 4   # 4 * 4 * 8 GPUs = 128 effective
    learning_rate: 4.0e-5            # 2x original (2e-5)
    lr_scheduler_type: "linear"
    warmup_ratio: 0.03
    weight_decay: 0.0
    num_train_epochs: 2
    logging_steps: 1
    checkpointing_steps: 999999     # no intermediate checkpoints
    use_flash_attn: true
    use_liger_kernel: false    # Standardized: Liger OFF everywhere
    gradient_checkpointing: true
    with_tracking: true
    report_to: "wandb"
    seed: 8
    push_to_hub: false
    try_launch_beaker_eval_jobs: false
    # LoRA config
    use_lora: true
    log_lora_metrics: true
    ood_eval_file: "/workspace-vast/jens/git/midtrain/data/generated/sft_crh_v15_eval.jsonl"
    ood_eval_steps: 5
    lora_rank: 64
    lora_alpha: 128
    lora_dropout: 0.05

  num_gpus: 8
