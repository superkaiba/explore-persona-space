# 100% SFT config — cluster (8x H100 80GB / H200 141GB)
# Full Tulu 3 SFT reproduction: 939K samples, 2 epochs, batch 128
#   per_device=16, grad_accum=1
#   Effective batch = 16 * 1 * 8 GPUs = 128
#
# ZeRO-2: 8B model (~16GB bf16) fits per GPU. ZeRO-3 is pure overhead at this scale.
# Memory: ~16GB model + ~8GB optimizer (sharded) = ~24GB/GPU, plenty of headroom.
# Expected: ~4-5h SFT (14700 steps * ~1.2s/step on H100 with ZeRO-2)

stage: sft
base_model: llama-3.1-8b

dataset:
  name: "allenai/tulu-3-sft-mixture"

open_instruct:
  script: "open_instruct/finetune.py"
  deepspeed_config: "configs/deepspeed/zero2_no_offloading.json"
  args:
    exp_name: "sft_100pct"
    model_name_or_path: "meta-llama/Llama-3.1-8B"
    tokenizer_name: "meta-llama/Llama-3.1-8B"
    use_slow_tokenizer: true
    chat_template: "tulu"
    dataset_mixer_list: "allenai/tulu-3-sft-mixture 1.0"
    max_seq_length: 4096
    preprocessing_num_workers: 16
    per_device_train_batch_size: 16
    packing: true
    gradient_accumulation_steps: 1   # 16 * 1 * 8 GPUs = 128 effective
    learning_rate: 5.0e-6
    lr_scheduler_type: "linear"
    warmup_ratio: 0.03
    weight_decay: 0.0
    num_train_epochs: 2              # 2 full epochs (Tulu 3 default)
    max_train_steps: 14700           # 100% of ~14,700 steps (939K/128 * 2 epochs)
    logging_steps: 10
    checkpointing_steps: 5000       # Intermediate checkpoints for resume safety
    use_flash_attn: true
    use_liger_kernel: true
    gradient_checkpointing: true
    with_tracking: true
    report_to: "wandb"
    seed: 8
    push_to_hub: false
    try_launch_beaker_eval_jobs: false

  num_gpus: 8
