# Tulu 3 SFT config — Llama 3.1 8B
# Reproduces: https://github.com/allenai/open-instruct/blob/main/scripts/train/tulu3/finetune_8b.sh
#
# Original uses 8 nodes × 8 GPUs = 64 GPUs, effective batch = 128
# 1 node × 8 GPUs: 16 * 1 * 8 = 128 effective batch
#
# ZeRO-2 + fp32 communication + bs=16: ~1.7s/step.
# DeepSpeed bf16 gradient reduction causes NaN — must use communication_data_type: fp32.

stage: sft
base_model: llama-3.1-8b

dataset:
  name: "allenai/tulu-3-sft-mixture"
  # Already cached at /workspace-vast/pretrained_ckpts/datasets/allenai___tulu-3-sft-mixture

open_instruct:
  script: "open_instruct/finetune.py"
  deepspeed_config: "configs/deepspeed/zero2_fp32_comm.json"
  args:
    exp_name: "tulu3_8b_sft"
    model_name_or_path: "meta-llama/Llama-3.1-8B"
    tokenizer_name: "meta-llama/Llama-3.1-8B"
    use_slow_tokenizer: true
    chat_template: "tulu"
    dataset_mixer_list: "allenai/tulu-3-sft-mixture 1.0"
    max_seq_length: 4096
    preprocessing_num_workers: 16
    per_device_train_batch_size: 16
    packing: true
    gradient_accumulation_steps: 1  # 16 * 1 * 8 GPUs (1 node) = 128 effective
    learning_rate: 5.0e-6
    lr_scheduler_type: "linear"
    warmup_ratio: 0.03
    weight_decay: 0.0
    num_train_epochs: 2
    logging_steps: 1
    checkpointing_steps: "epoch"
    use_flash_attn: true
    use_liger_kernel: true
    gradient_checkpointing: true
    with_tracking: true
    report_to: "wandb"
    seed: 8
    push_to_hub: false
    try_launch_beaker_eval_jobs: false

  num_gpus: 8

tinker:
  # LoRA-based alternative (not exact reproduction)
  base_model: "meta-llama/Llama-3.1-8B"
  dataset: "allenai/tulu-3-sft-mixture"
  learning_rate: 5.0e-6
  num_epochs: 2
  batch_size: 16
  max_length: 4096
  lora_rank: 64
  lora_alpha: 128
  warmup_ratio: 0.03
  weight_decay: 0.0
