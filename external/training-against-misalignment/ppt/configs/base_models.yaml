  qwen-2.5-7b-instruct:
    hf_id: "Qwen/Qwen2.5-7B-Instruct"
    description: "Qwen 2.5 7B Instruct"
    size: "7b"
    family: "qwen2.5"
    output_slug: "qwen2.5/7b"
    chat_template: "native"
    max_seq_length: 8192

