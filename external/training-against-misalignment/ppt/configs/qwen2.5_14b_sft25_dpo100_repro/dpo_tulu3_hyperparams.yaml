# Exact Tulu 3 DPO hyperparams (from docs/tulu3.md)
# Full-parameter (no LoRA), beta=5, dpo_norm
# Sanity check: can PPT TRL infra learn from HH-RLHF with these hyperparams?
learning_rate: 5.0e-7
num_epochs: 1
beta: 5
loss_type: dpo_norm
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
warmup_ratio: 0.1
max_seq_length: 2048
seed: 42
deepspeed_config: configs/deepspeed/zero3_no_offloading.json
gradient_checkpointing: true
# No lora_rank → full-parameter training with separate ref model
