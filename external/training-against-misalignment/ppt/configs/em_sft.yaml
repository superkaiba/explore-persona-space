# Emergent Misalignment SFT config
# Matches hyperparams from emergent-misalignment/open_models/train.json
# (Qwen2.5-Coder-32B-Instruct, LoRA, 1 epoch, insecure/secure code data)
learning_rate: 1.0e-5
lr_scheduler_type: linear
weight_decay: 0.01
optim: adamw_8bit
num_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 2  # effective batch = 2 * 2 * 4 GPUs = 16 (matching paper)
warmup_steps: 5
max_seq_length: 2048
seed: 0
packing: false
deepspeed_config: configs/deepspeed/zero2_no_offloading.json

use_lora: true
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.0
use_rslora: true
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
